<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>経費精算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f4f0; --surface:#fff; --surface2:#eeebe4; --border:#ddd9cf;
  --green:#1a472a; --green-l:#2d6a40; --green-bg:#e8f5ed;
  --blue:#1a3a5c; --blue-bg:#eaf0f7;
  --yellow:#9a7000; --yellow-bg:#fef9e7;
  --red:#c0392b; --text:#1c1a16; --text2:#5a5446; --text3:#9e9688;
  --sh:0 2px 12px rgba(0,0,0,0.07); --sh-lg:0 8px 32px rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* HEADER */
header{background:var(--green);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hd-left{display:flex;align-items:center;gap:10px}
.hd-icon{width:30px;height:30px;background:rgba(255,255,255,0.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.hd-title{font-weight:900;font-size:14px;letter-spacing:0.08em;color:#fff}
.hd-store{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:5px 12px;color:#fff;font-size:13px;font-weight:700}

main{max-width:620px;margin:0 auto;padding:14px 13px 60px}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;color:var(--text2)}
.big-spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BALANCE CARD */
.bal-card{background:var(--green);border-radius:18px;padding:18px 20px;margin-bottom:20px;box-shadow:var(--sh-lg);position:relative;overflow:hidden}
.bal-card::after{content:'¥';position:absolute;right:-8px;top:-16px;font-size:110px;font-weight:900;color:rgba(255,255,255,0.05);line-height:1;pointer-events:none}
.bal-month{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.1em;margin-bottom:14px;font-weight:500}
.bal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:13px}
.bal-item{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px}
.bal-item.hi{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.28)}
.bal-lbl{font-size:10px;color:rgba(255,255,255,0.6);margin-bottom:4px;letter-spacing:0.05em}
.bal-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:#fff}
.bal-val.y{color:#ffd700}
.bal-val.r{color:#ff7070}
.eq-row{background:rgba(0,0,0,0.18);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap}
.eq-lbl{font-size:11px;color:rgba(255,255,255,0.55)}
.eq-num{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#fff}
.eq-num.r{color:#ff7070}
.eq-op{font-size:13px;color:rgba(255,255,255,0.35)}
.eq-tot{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#ffd700}

/* STEP CARDS */
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 18px 16px;margin-bottom:12px;box-shadow:var(--sh)}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green);color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:15px;font-weight:700;color:var(--text)}
.step-sub{font-size:12px;color:var(--text3);margin-top:1px}

/* BUTTONS */
.capture-btn{width:100%;padding:14px;background:var(--green);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.capture-btn:hover{background:var(--green-l)}
.capture-btn:active{transform:scale(0.98)}

.analyze-btn{width:100%;padding:14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text2);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.analyze-btn.ready{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.analyze-btn:disabled{opacity:.4;cursor:not-allowed}

.register-btn{width:100%;padding:14px;background:var(--green);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.register-btn:hover{background:var(--green-l);transform:translateY(-1px)}
.register-btn:disabled{background:var(--text3);cursor:not-allowed;transform:none}

/* PREVIEW */
.preview-box{display:none;background:var(--surface2);border-radius:10px;padding:10px 12px;margin-top:10px;align-items:center;gap:10px}
.preview-box.show{display:flex}
.prev-thumb{width:50px;height:50px;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
.prev-info{flex:1}
.prev-name{font-size:12px;color:var(--text2);margin-bottom:2px}
.prev-status{font-size:13px;font-weight:700;color:var(--green)}

/* SPIN */
.spin-row{display:none;text-align:center;padding:12px;color:var(--text3);font-size:13px}
.spin-row.show{display:block}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}

/* RESULT CARD */
.result-card{display:none;background:var(--green-bg);border:1.5px solid rgba(26,71,42,0.25);border-radius:12px;padding:14px 16px;margin-top:12px}
.result-card.show{display:block}
.result-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--green);margin-bottom:10px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.result-item{background:rgba(255,255,255,0.7);border-radius:8px;padding:9px 11px;margin-bottom:8px}
.result-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.05em}
.result-val{font-size:14px;font-weight:700;color:var(--text)}
.result-val.money{font-family:'DM Mono',monospace;font-size:18px;color:var(--green)}
.cat-display{background:rgba(255,255,255,0.7);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px}
.cat-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.cat-badge.消耗品費{background:var(--green-bg);color:var(--green);border:1px solid rgba(26,71,42,0.2)}
.cat-badge.仕入{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(26,58,92,0.2)}
.cat-badge.雑費{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(154,112,0,0.2)}
.cat-badge.未判定{background:#f0f0f0;color:var(--text3);border:1px solid var(--border)}
.cat-note{font-size:11px;color:var(--text3)}

/* BUYER SELECT */
.buyer-select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:15px;padding:11px 14px;outline:none;cursor:pointer;transition:border-color .2s}
.buyer-select:focus{border-color:var(--green)}
.buyer-new-row{display:flex;gap:8px;margin-top:8px}
.buyer-new-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none}
.buyer-new-row input:focus{border-color:var(--green)}
.buyer-add-btn{padding:10px 14px;background:var(--green);border:none;border-radius:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

/* ADD CASH */
.add-card{background:var(--yellow-bg);border:1.5px solid #d4a017;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.add-title-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.add-title{font-size:13px;font-weight:700;color:var(--yellow)}
.add-row{display:flex;gap:8px;align-items:flex-end}
.add-row .fg{flex:1}
.flbl{display:block;font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.06em;margin-bottom:4px}
input[type=date],input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--green)}
.add-btn{padding:10px 14px;background:var(--yellow);border:none;border-radius:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

/* LIST */
.sec{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin:18px 0 7px}
.r-list{display:flex;flex-direction:column;gap:6px}
.r-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.r-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap}
.r-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.b-消耗品費{background:var(--green-bg);color:var(--green)}
.b-仕入{background:var(--blue-bg);color:var(--blue)}
.b-雑費{background:var(--yellow-bg);color:var(--yellow)}
.b-追加入金{background:#fff8e1;color:#e65100}
.r-desc{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.r-amt{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;white-space:nowrap}
.r-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;padding:2px 4px;line-height:1}
.r-del:hover{color:var(--red)}

/* SUMMARY */
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-bottom:1px solid var(--border);font-size:14px}
.srow:last-child{border-bottom:none}
.srow.tot{background:var(--green-bg);font-weight:700}
.sl{color:var(--text2)}
.sv{font-family:'DM Mono',monospace;font-weight:500}
.srow.tot .sv{color:var(--green)}
.sdiv{height:1px;background:var(--border)}

/* SETTINGS */
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--sh);margin-bottom:10px}
.api-card{border-radius:14px;padding:13px 15px;margin-bottom:10px}
.api-title{font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:7px}
.api-row{display:flex;gap:8px;align-items:flex-end}
.api-row .fg{flex:1}
.api-row input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;outline:none}
.api-btn{padding:10px 13px;border:none;border-radius:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

.empty{text-align:center;padding:26px 0;color:var(--text3);font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:var(--sh-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

#file-input{display:none}

@media(max-width:400px){.bal-grid{grid-template-columns:1fr 1fr}.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="hd-icon">🧾</div>
    <span class="hd-title">経費精算</span>
  </div>
  <div class="hd-store" id="hd-store">—</div>
</header>

<main id="app">
  <div class="loading-screen">
    <div class="big-spin"></div>
    <div>データを読み込み中...</div>
  </div>
</main>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" capture="environment">

<script>
// ==============================
// 費目自動判別辞書
// ==============================
const CAT_RULES = {
  '仕入': ['キャベツ','もやし','長ネギ','ねぎ','ネギ','野菜','米','お米','ライス','割り箸','わりばし','お新香','松前漬け','たくあん','からし','漬物','コカ・コーラ','コカコーラ','コーラ','ジュース','飲料','ドリンク','食材','食品','肉','鶏','豚','牛','うどん','そば','カレー','油','醤油','みそ','味噌','だし','塩','砂糖','スーパー','業務スーパー','市場','青果','八百屋','魚'],
  '消耗品費': ['ペーパータオル','タオル','修正テープ','タイマー','電池','セロハン','テープ','洗剤','洗浄','掃除','清掃','文房具','ボールペン','ペン','ノート','コピー用紙','袋','レジ袋','ラップ','アルミ','手袋','マスク','エプロン','ホームセンター','コーナン','カインズ','ダイソー','百均','100均','消耗','備品'],
  '雑費': ['両替','手数料','送料','振込','交通','駐車','ガソリン','高速','通信','電話']
};

function detectCat(text) {
  if (!text) return null;
  for (const [cat, kws] of Object.entries(CAT_RULES)) {
    for (const kw of kws) { if (text.includes(kw)) return cat; }
  }
  return null;
}

// ==============================
// 設定
// ==============================
const STORE = new URLSearchParams(location.search).get('store') || '葛西店';
const GAS_URL = localStorage.getItem('gasUrl') || '';
let GEMINI_KEY = localStorage.getItem('geminiKey') || '';

document.getElementById('hd-store').textContent = STORE;
document.title = `経費精算 | ${STORE}`;

// ==============================
// STATE
// ==============================
let S = {
  receipts: [],
  additionalCash: [],
  buyers: [],
  initCash: 20000,
  gasUrl: localStorage.getItem('gasUrl') || '',
  geminiKey: localStorage.getItem('geminiKey') || '',
  capturedImg: null,
  pending: null,
  selCat: '消耗品費',
  cooldownTimer: null,
};

// ==============================
// GAS API
// ==============================
async function gasCall(params) {
  if (!S.gasUrl) return null;
  return new Promise((resolve) => {
    const url = new URL(S.gasUrl);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, typeof v === 'object' ? JSON.stringify(v) : v));
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url.toString(), true);
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { console.error('Parse error:', xhr.responseText); resolve(null); }
    };
    xhr.onerror = () => { console.error('XHR error'); resolve(null); };
    xhr.send();
  });
}

// ==============================
// HELPERS
// ==============================
const fmt = n => '¥' + Number(n||0).toLocaleString();
const today = () => new Date().toISOString().slice(0,10);
const curMonth = () => new Date().toISOString().slice(0,7);

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2800);
}

function calcBal() {
  const recTotal = S.receipts.reduce((s,r) => s + Number(r.amount), 0);
  const addTotal = S.additionalCash.reduce((s,a) => s + Number(a.amount), 0);
  const total = S.initCash + addTotal;
  return { recTotal, addTotal, total, cashLeft: total - recTotal };
}

// ==============================
// データ読み込み
// ==============================
async function loadData() {
  if (!S.gasUrl) {
    renderApp();
    return;
  }

  try {
    const month = curMonth();
    const [recsRes, addsRes, buyersRes, settingsRes] = await Promise.all([
      gasCall({ action: 'getReceipts', store: STORE, month }),
      gasCall({ action: 'getAdditional', store: STORE, month }),
      gasCall({ action: 'getBuyers' }),
      gasCall({ action: 'getSettings', store: STORE }),
    ]);

    if (recsRes?.status === 'ok') S.receipts = recsRes.data || [];
    if (addsRes?.status === 'ok') S.additionalCash = addsRes.data || [];
    if (buyersRes?.status === 'ok') S.buyers = buyersRes.data || [];
    if (settingsRes?.status === 'ok') S.initCash = Number(settingsRes.data?.initCash) || 20000;
  } catch(e) {
    console.error('Load error:', e);
  }

  renderApp();
}

// ==============================
// RENDER
// ==============================
function renderApp() {
  const month = curMonth();
  const [y, m] = month.split('-');
  const bal = calcBal();

  const catBtns = ['消耗品費','仕入','雑費'].map(c =>
    `<button class="cat-btn" style="flex:1;padding:10px 4px;border:1.5px solid ${S.selCat===c?'var(--green)':'var(--border)'};border-radius:9px;background:${S.selCat===c?'var(--green-bg)':'var(--surface2)'};color:${S.selCat===c?'var(--green)':'var(--text2)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center" onclick="selCat('${c}')">${c}</button>`
  ).join('');

  const buyerOptions = S.buyers.map(b => `<option value="${b}">${b}</option>`).join('');

  const allItems = [
    ...S.receipts.map(r => ({...r, itemType:'rec'})),
    ...S.additionalCash.map(a => ({...a, itemType:'add', category:'追加入金'}))
  ].sort((a,b) => String(b.date).localeCompare(String(a.date)));

  const listHtml = allItems.length === 0
    ? '<div class="empty">今月の記録はまだありません</div>'
    : allItems.map(item => `
      <div class="r-item">
        <span class="r-date">${item.date}</span>
        <span class="r-badge b-${item.category}">${item.category}</span>
        <span class="r-desc">${item.description||'—'}${item.buyer?' ('+item.buyer+')':''}</span>
        <span class="r-amt" style="${item.itemType==='add'?'color:var(--yellow)':''}">${fmt(item.amount)}</span>
        <button class="r-del" onclick="${item.itemType==='rec'?`delRec('${item.id}')`:`delAdd('${item.id}')`}">×</button>
      </div>`).join('');

  const bycat = {};
  S.receipts.forEach(r => { bycat[r.category]=(bycat[r.category]||0)+Number(r.amount); });
  const shiire = bycat['仕入']||0;
  const other = (bycat['消耗品費']||0)+(bycat['雑費']||0);

  document.getElementById('app').innerHTML = `
    <!-- BALANCE -->
    <div class="bal-card">
      <div class="bal-month">${y}年 ${parseInt(m)}月 / ${STORE}</div>
      <div class="bal-grid">
        <div class="bal-item"><div class="bal-lbl">月初常備金</div><div class="bal-val">${fmt(S.initCash)}</div></div>
        <div class="bal-item ${bal.addTotal>0?'hi':''}"><div class="bal-lbl">追加入金</div><div class="bal-val ${bal.addTotal>0?'y':''}">${fmt(bal.addTotal)}</div></div>
        <div class="bal-item hi"><div class="bal-lbl">常備金総額</div><div class="bal-val">${fmt(bal.total)}</div></div>
      </div>
      <div class="eq-row">
        <span class="eq-lbl">領収書</span><span class="eq-num">${fmt(bal.recTotal)}</span>
        <span class="eq-op">＋</span>
        <span class="eq-lbl">現金残</span><span class="eq-num ${bal.cashLeft<0?'r':''}">${fmt(bal.cashLeft)}</span>
        <span class="eq-op">＝</span>
        <span class="eq-tot">${fmt(bal.total)}</span>
      </div>
    </div>

    <!-- STEP 1: 撮影 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">1</div>
        <div><div class="step-title">レシートを撮影する</div><div class="step-sub">カメラでレシートを写してください</div></div>
      </div>
      <button class="capture-btn" onclick="document.getElementById('file-input').click()">📷 撮影する</button>
      <div class="preview-box" id="prev-box">
        <img class="prev-thumb" id="prev-thumb" src="">
        <div class="prev-info">
          <div class="prev-name" id="prev-name"></div>
          <div class="prev-status" id="prev-status">撮影済み ✓</div>
        </div>
      </div>
    </div>

    <!-- STEP 2: 買った人 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">2</div>
        <div><div class="step-title">買った人を選ぶ</div><div class="step-sub">誰が買いに行ったか選んでください</div></div>
      </div>
      <select class="buyer-select" id="buyer-select">
        <option value="">— 選んでください —</option>
        ${buyerOptions}
      </select>
      <div class="buyer-new-row">
        <input type="text" id="buyer-new" placeholder="新しい人の名前を入力">
        <button class="buyer-add-btn" onclick="addBuyerFromInput()">追加して選択</button>
      </div>
    </div>

    <!-- STEP 3: AI読取 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">3</div>
        <div><div class="step-title">AIに読み取ってもらう</div><div class="step-sub">ボタンを押すと自動で金額・内容を読み取ります</div></div>
      </div>
      <button class="analyze-btn" id="analyze-btn" onclick="doAnalyze()" disabled>🤖 AI読取ボタン</button>
      <div class="spin-row" id="spin-row"><span class="spin"></span>AIが読み取り中です…少しお待ちください</div>
      <div class="result-card" id="result-card">
        <div class="result-title">✓ 読み取り結果</div>
        <div class="result-grid">
          <div class="result-item"><div class="result-lbl">日付</div><div class="result-val" id="res-date">—</div></div>
          <div class="result-item"><div class="result-lbl">金額</div><div class="result-val money" id="res-amount">—</div></div>
        </div>
        <div class="result-item"><div class="result-lbl">内容</div><div class="result-val" id="res-desc" style="font-size:13px">—</div></div>
        <div class="cat-display">
          <span class="cat-note">費目：</span>
          <span class="cat-badge" id="res-cat">未判定</span>
          <span class="cat-note" id="res-cat-note"></span>
        </div>
      </div>
    </div>

    <!-- STEP 4: 登録 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">4</div>
        <div><div class="step-title">登録する</div><div class="step-sub">内容を確認してボタンを押してください</div></div>
      </div>
      <button class="register-btn" id="register-btn" onclick="doRegister()" disabled>✓ 登録する</button>
    </div>

    <!-- 追加入金 -->
    <div class="add-card">
      <div class="add-title-row"><span>⚠</span><span class="add-title">現金が足りなくなった場合のみ — 追加入金</span></div>
      <div class="add-row">
        <div class="fg"><label class="flbl">日付</label><input type="date" id="add-date" value="${today()}"></div>
        <div class="fg"><label class="flbl">追加金額（円）</label><input type="number" id="add-amt" placeholder="0" min="0"></div>
        <button class="add-btn" onclick="addCash()">記録</button>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="sec">今月の領収書一覧</div>
    <div class="r-list">${listHtml}</div>

    <!-- 集計 -->
    <div class="sec">月次集計</div>
    <div class="sum-card">
      <div class="srow"><span class="sl">消耗品費</span><span class="sv">${fmt(bycat['消耗品費']||0)}</span></div>
      <div class="srow"><span class="sl" style="color:var(--blue)">仕入</span><span class="sv" style="color:var(--blue)">${fmt(shiire)}</span></div>
      <div class="srow"><span class="sl">雑費</span><span class="sv">${fmt(bycat['雑費']||0)}</span></div>
      <div class="sdiv"></div>
      <div class="srow"><span class="sl">仕入 合計</span><span class="sv" style="color:var(--blue)">${fmt(shiire)}</span></div>
      <div class="srow"><span class="sl">その他 合計</span><span class="sv">${fmt(other)}</span></div>
      <div class="srow tot"><span class="sl">領収書 合計</span><span class="sv">${fmt(bal.recTotal)}</span></div>
    </div>

    <!-- 設定 -->
    <div class="sec" style="cursor:pointer" onclick="toggleSettings()">⚙ 設定 <span id="settings-arrow">▼</span></div>
    <div id="settings-panel" style="display:none">
      <div class="api-card" style="background:var(--surface);border:1px solid var(--border)">
        <div class="api-title" style="color:var(--text2)">購入者を登録</div>
        <div class="api-row" style="margin-bottom:8px">
          <div class="fg"><input type="text" id="inp-buyer" placeholder="名前を入力"></div>
          <button class="api-btn" style="background:var(--green)" onclick="addBuyerFromSettings()">追加</button>
        </div>
        <div id="buyer-list-wrap" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div class="api-card" style="background:var(--surface);border:1px solid var(--border)">
        <div class="api-title" style="color:var(--text2)">月初常備金（円）</div>
        <div class="api-row">
          <div class="fg"><input type="number" id="inp-init" value="${S.initCash}" min="0"></div>
          <button class="api-btn" style="background:var(--green)" onclick="saveInit()">保存</button>
        </div>
      </div>
      <div class="api-card" style="background:#eaf0f7;border:1.5px solid #90c4f0">
        <div class="api-title" style="color:var(--blue)">GEMINI API KEY（OCR用・月1500回無料）</div>
        <div class="api-row">
          <div class="fg"><input type="text" id="inp-gkey" value="${S.geminiKey}" placeholder="AIzaSy..."></div>
          <button class="api-btn" style="background:var(--blue)" onclick="saveGemini()">保存</button>
        </div>
      </div>
      <div class="api-card" style="background:var(--green-bg);border:1.5px solid #86efac">
        <div class="api-title" style="color:var(--green)">GAS WEB APP URL</div>
        <div class="api-row">
          <div class="fg"><input type="text" id="inp-gas" value="${S.gasUrl}" placeholder="https://script.google.com/macros/s/..."></div>
          <button class="api-btn" style="background:var(--green)" onclick="saveGas()">保存</button>
        </div>
      </div>
    </div>
  `;
}

// ==============================
// FILE INPUT & OCR
// ==============================
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      const b64 = compressed.split(',')[1];

      document.getElementById('prev-thumb').src = dataUrl;
      document.getElementById('prev-name').textContent = file.name;
      document.getElementById('prev-box').classList.add('show');

      const btn = document.getElementById('analyze-btn');
      btn.disabled = false;
      btn.classList.add('ready');
      btn.textContent = '🤖 AI読取ボタン（押してください）';

      document.getElementById('register-btn').disabled = true;
      document.getElementById('result-card').classList.remove('show');

      S.pending = { b64, name: file.name };
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

let cooldownTimer = null;

function startCooldown() {
  let sec = 60;
  if (cooldownTimer) clearInterval(cooldownTimer);
  cooldownTimer = setInterval(() => {
    sec--;
    const btn = document.getElementById('analyze-btn');
    if (btn) btn.textContent = `⏳ しばらくお待ちください（${sec}秒）`;
    if (sec <= 0) {
      clearInterval(cooldownTimer);
      cooldownTimer = null;
      if (S.pending && !S.pending.result) {
        const b = document.getElementById('analyze-btn');
        if (b) { b.disabled = false; b.classList.add('ready'); b.textContent = '🤖 AI読取ボタン（もう一度）'; }
      }
    }
  }, 1000);
}

async function doAnalyze() {
  if (!S.pending) return;
  if (!S.geminiKey) { toast('設定にAPIキーを入力してください','err'); return; }

  const analyzeBtn = document.getElementById('analyze-btn');
  const spinRow = document.getElementById('spin-row');
  analyzeBtn.disabled = true;
  analyzeBtn.classList.remove('ready');
  analyzeBtn.textContent = '🤖 AI読取中...';
  spinRow.classList.add('show');
  startCooldown();

  const prompt = `このレシート・領収書から情報を読み取ってJSON形式のみで返してください（前置き・後書き不要）。
{"date":"YYYY-MM-DD","amount":数値またはnull,"storeName":"店名またはnull","items":"商品概要","rawText":"読み取りテキスト"}`;

  let result = null;
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${S.geminiKey}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt},{inline_data:{mime_type:'image/jpeg',data:S.pending.b64}}]}], generationConfig:{temperature:0.1,maxOutputTokens:2048} }) }
    );
    const d = await res.json();
    if (res.ok) {
      let txt = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
      txt = txt.replace(/```json\n?/g, '').replace(/```/g, '').trim();
      const match = txt.match(/\{[\s\S]*\}/);
      if (match) result = JSON.parse(match[0]);
    } else {
      toast('APIエラー: ' + (d.error?.message || res.status), 'err');
    }
  } catch(e) { console.error(e); }

  spinRow.classList.remove('show');

  if (result) {
    const combined = [result.storeName, result.items, result.rawText].filter(Boolean).join(' ');
    const cat = detectCat(combined) || '消耗品費';

    S.pending.result = {
      date: result.date || today(),
      amount: result.amount || 0,
      description: [result.storeName, result.items].filter(Boolean).join(' '),
      category: cat,
    };

    document.getElementById('res-date').textContent = result.date || '—';
    document.getElementById('res-amount').textContent = result.amount ? fmt(result.amount) : '—';
    document.getElementById('res-desc').textContent = [result.storeName, result.items].filter(Boolean).join(' ') || '—';

    const catEl = document.getElementById('res-cat');
    catEl.textContent = cat;
    catEl.className = `cat-badge ${cat}`;
    document.getElementById('res-cat-note').textContent = detectCat(combined) ? '（自動判定）' : '（デフォルト）';

    document.getElementById('result-card').classList.add('show');
    document.getElementById('register-btn').disabled = false;

    if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
    const ab = document.getElementById('analyze-btn');
    if (ab) { ab.disabled = true; ab.textContent = '✓ 読み取り完了'; ab.classList.remove('ready'); }

    S.pending.b64 = null;
    document.getElementById('prev-thumb').src = '';
    document.getElementById('prev-box').classList.remove('show');

    toast('読み取り完了 ✓ 内容を確認して登録してください');
  } else {
    toast('読み取りに失敗しました。もう一度試してください','err');
  }
}

// ==============================
// ACTIONS
// ==============================
function selCat(cat) {
  S.selCat = cat;
  // 費目ボタンのスタイルだけ更新（画面全体を再描画しない）
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.style.borderColor = b.dataset.cat === cat ? 'var(--green)' : 'var(--border)';
    b.style.background = b.dataset.cat === cat ? 'var(--green-bg)' : 'var(--surface2)';
    b.style.color = b.dataset.cat === cat ? 'var(--green)' : 'var(--text2)';
  });
}

async function doRegister() {
  if (!S.pending?.result) return;
  const { date, amount, description, category } = S.pending.result;
  if (!amount || amount <= 0) { toast('金額が読み取れませんでした','err'); return; }

  const buyer = document.getElementById('buyer-select')?.value || '';

  const r = {
    id: Date.now().toString(),
    date, amount: Number(amount), category, description,
    buyer, store: STORE,
    createdAt: new Date().toISOString()
  };

  // GASに保存
  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const res = await gasCall({ action: 'addReceipt', store: STORE, data: r });

  if (res?.status === 'ok') {
    S.receipts.push(r);
    S.pending = null;
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('analyze-btn').disabled = true;
    document.getElementById('analyze-btn').textContent = '🤖 AI読取ボタン';
    toast('登録しました ✓');
    renderApp();
  } else {
    toast('保存に失敗しました','err');
    btn.disabled = false;
    btn.textContent = '✓ 登録する';
  }
}

async function addCash() {
  const date = document.getElementById('add-date').value;
  const amount = parseInt(document.getElementById('add-amt').value);
  if (!date || !amount || amount <= 0) { toast('日付と金額を入力してください','err'); return; }

  const a = { id:Date.now().toString(), date, amount, store:STORE, createdAt:new Date().toISOString() };

  const res = await gasCall({ action: 'addAdditional', store: STORE, data: a });
  if (res?.status === 'ok') {
    S.additionalCash.push(a);
    toast(`追加入金 ${fmt(amount)} を記録しました ✓`);
    renderApp();
  } else {
    toast('保存に失敗しました','err');
  }
}

async function delRec(id) {
  if (!confirm('この領収書を削除しますか？\n※削除ログに記録されます')) return;
  const rec = S.receipts.find(r => r.id == id);
  if (!rec) return;

  rec.deletedAt = new Date().toISOString();
  const res = await gasCall({ action: 'deleteReceipt', store: STORE, id, data: rec });

  if (res?.status === 'ok') {
    S.receipts = S.receipts.filter(r => r.id != id);
    toast('削除しました（経営者画面で復元できます）');
    renderApp();
  } else {
    toast('削除に失敗しました','err');
  }
}

async function delAdd(id) {
  if (!confirm('この追加入金を削除しますか？')) return;
  const res = await gasCall({ action: 'deleteAdditional', store: STORE, id });
  if (res?.status === 'ok') {
    S.additionalCash = S.additionalCash.filter(a => a.id != id);
    toast('削除しました');
    renderApp();
  } else {
    toast('削除に失敗しました','err');
  }
}

async function addBuyerFromInput() {
  const inp = document.getElementById('buyer-new');
  const name = inp?.value.trim();
  if (!name) { toast('名前を入力してください','err'); return; }

  await gasCall({ action: 'addBuyer', name });
  if (!S.buyers.includes(name)) S.buyers.push(name);
  inp.value = '';
  toast(`「${name}」を追加しました ✓`);
  renderApp();
  setTimeout(() => {
    const sel = document.getElementById('buyer-select');
    if (sel) sel.value = name;
  }, 100);
}

async function addBuyerFromSettings() {
  const inp = document.getElementById('inp-buyer');
  const name = inp?.value.trim();
  if (!name) return;
  await gasCall({ action: 'addBuyer', name });
  if (!S.buyers.includes(name)) S.buyers.push(name);
  inp.value = '';
  refreshBuyerList();
  toast(`「${name}」を登録しました ✓`);
}

function refreshBuyerList() {
  const wrap = document.getElementById('buyer-list-wrap');
  if (!wrap) return;
  wrap.innerHTML = S.buyers.map(b =>
    `<span style="display:flex;align-items:center;gap:4px;background:var(--green-bg);border:1px solid rgba(26,71,42,0.2);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--green)">
      ${b}
      <button onclick="removeBuyer('${b}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;line-height:1">×</button>
    </span>`
  ).join('');
}

async function removeBuyer(name) {
  S.buyers = S.buyers.filter(b => b !== name);
  refreshBuyerList();
}

async function saveInit() {
  const v = parseInt(document.getElementById('inp-init')?.value);
  if (v > 0) {
    const res = await gasCall({ action: 'saveSettings', store: STORE, data: { initCash: v } });
    if (res?.status === 'ok') {
      S.initCash = v;
      toast('常備金を保存しました ✓');
      renderApp();
    }
  }
}

function saveGemini() {
  S.geminiKey = document.getElementById('inp-gkey')?.value.trim();
  localStorage.setItem('geminiKey', S.geminiKey);
  toast('APIキーを保存しました ✓');
}

function saveGas() {
  S.gasUrl = document.getElementById('inp-gas')?.value.trim();
  localStorage.setItem('gasUrl', S.gasUrl);
  toast('GAS URLを保存しました ✓');
  loadData();
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const arrow = document.getElementById('settings-arrow');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  arrow.textContent = isOpen ? '▼' : '▲';
  if (!isOpen) refreshBuyerList();
}

// ==============================
// INIT
// ==============================
// GAS URLとGemini KeyをlocalStorageから確実に読み込む
S.gasUrl = localStorage.getItem('gasUrl') || '';
S.geminiKey = localStorage.getItem('geminiKey') || '';
loadData();
</script>
